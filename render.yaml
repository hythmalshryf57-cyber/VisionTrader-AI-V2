service: web
name: visiontrader-backend
env: python
buildCommand: pip install -r backend/requirements.txt
startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
plan: free

envVars:
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: ADMIN_CHAT_ID
    value: "6380833552"
  - key: ADMIN_EMAIL
    sync: false
  - key: ADMIN_PASSWORD
    sync: false

databases:
  - name: visiontrader-db
    plan: free
