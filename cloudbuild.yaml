steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/visiontrader-ai:$SHORT_SHA'
      - '.'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'visiontrader-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/visiontrader-ai:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'PORT=8000'
images:
  - 'gcr.io/$PROJECT_ID/visiontrader-ai:$SHORT_SHA'
options:
  logging: 'GCS'
timeout: '1200s'
