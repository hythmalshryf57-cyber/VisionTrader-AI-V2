services:
  - type: web
    name: visiontrader-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visiontrader-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CALENDAR_API_KEY
        sync: false
      - key: MT5_LOGIN
        sync: false
      - key: MT5_PASSWORD
        sync: false
      - key: MT5_SERVER
        sync: false

databases:
  - name: visiontrader-db
    plan: free
