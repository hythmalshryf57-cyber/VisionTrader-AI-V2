<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">

    <title>إنشاء حساب - VisionTrader AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease;
        }
        .login-card .brand-logo { text-align: center; margin-bottom: 32px; }
        .login-card .brand-logo i { font-size: 2.5rem; background: linear-gradient(135deg, var(--accent), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card .brand-logo h2 { margin-top: 8px; font-weight: 800; font-size: 1.6rem; }
        .login-card .brand-logo p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 14px 16px; font-size: 1rem; }
        .login-btn { width: 100%; padding: 14px; font-size: 1.05rem; margin-top: 8px; }
        .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
        .login-footer { text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.82rem; }
        .secondary-action { display: inline-block; margin-top: 16px; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text); text-decoration: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="login-card fade-in">
        <div class="brand-logo">
            <i class="fas fa-user-plus"></i>
            <h2>إنشاء حساب جديد</h2>
            <p>سجل مباشرة بدون رمز دعوة</p>
        </div>
        <form id="registerForm" onsubmit="return false;">
            <div class="form-group">
                <label for="registerEmail"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input class="cosmic-input" type="email" id="registerEmail" placeholder="test@test.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="registerPassword"><i class="fas fa-lock"></i> كلمة المرور</label>
                <input class="cosmic-input" type="password" id="registerPassword" placeholder="••••••" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="registerInvite"><i class="fas fa-key"></i> رمز الدعوة (اختياري)</label>
                <input class="cosmic-input" type="text" id="registerInvite" placeholder="إذا كان لديك رمز دعوة">
            </div>
            <button type="submit" class="btn btn-primary login-btn" id="registerBtn">
                <i class="fas fa-user-check"></i> إنشاء حساب جديد
            </button>
            <div class="login-error" id="registerError"></div>
        </form>
        <div class="login-footer">
            <a class="btn btn-secondary secondary-action" href="login.html">العودة إلى تسجيل الدخول</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async () => {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const inviteCode = document.getElementById('registerInvite').value.trim();
            const btn = document.getElementById('registerBtn');
            const errEl = document.getElementById('registerError');
            errEl.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-sm"></span> جاري الإنشاء...';

            try {
                const res = await api.register(email, password, inviteCode);
                localStorage.setItem('token', res.access_token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errEl.textContent = err.message || 'فشل إنشاء الحساب';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check"></i> إنشاء حساب جديد';
            }
        });

        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
