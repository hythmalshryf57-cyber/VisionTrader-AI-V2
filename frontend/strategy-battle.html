<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">

    <title>Strategy Battle - VisionTrader AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .battle-container { padding: 30px; max-width: 900px; margin: 0 auto; }
        .rank-item { display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); transition: 0.3s; }
        .rank-item:hover { transform: scale(1.02); border-color: var(--accent-blue); }
        .rank-number { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .rank-1 .rank-number { background: #ffd700; color: black; }
        .strategy-info { flex: 1; }
        .win-rate-pill { background: rgba(0,255,136,0.1); color: #00ff88; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body class="dark-theme">
    <div class="battle-container">
        <h1 style="text-align: center; margin-bottom: 40px;"><i class="fas fa-trophy" style="color: #ffd700;"></i> صراع الاستراتيجيات</h1>
        
        <div class="rank-item rank-1">
            <div class="rank-number">1</div>
            <div class="strategy-info">
                <h3>SMC / ICT</h3>
                <p style="color: #888;">سيولة المؤسسات والمناطق السعرية</p>
            </div>
            <div class="win-rate-pill">92% نجاح</div>
        </div>

        <div class="rank-item">
            <div class="rank-number">2</div>
            <div class="strategy-info">
                <h3>Wyckoff Theory</h3>
                <p style="color: #888;">مراحل التجميع والتصريف</p>
            </div>
            <div class="win-rate-pill">85% نجاح</div>
        </div>

        <div class="rank-item">
            <div class="rank-number">3</div>
            <div class="strategy-info">
                <h3>Elliott Wave</h3>
                <p style="color: #888;">تحليل الدورات الموجية</p>
            </div>
            <div class="win-rate-pill">78% نجاح</div>
        </div>

        <div class="rank-item">
            <div class="rank-number">4</div>
            <div class="strategy-info">
                <h3>VSA (Volume Spread Analysis)</h3>
                <p style="color: #888;">تحليل السعر والجهد المبذول</p>
            </div>
            <div class="win-rate-pill">74% نجاح</div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
