<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>المساعد الذكي - VisionTrader AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Minimal page-specific styles to ensure chat layout */
        .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .topbar { grid-column: 1 / -1; display:flex; align-items:center; gap:12px; padding:12px 20px; background: rgba(0,0,0,0.35); border-bottom:1px solid rgba(255,255,255,0.03); }
        .topbar .title { font-weight:800; font-size:1.05rem; }
        .sidebar { background: rgba(0,0,0,0.35); padding: 18px; }
        .sidebar a { display:block; padding:10px 12px; margin-bottom:8px; border-radius:10px; color:var(--text-stellar); text-decoration:none; }
        .chat-area { display:flex; flex-direction:column; height: calc(100vh - 64px); }
        .messages { flex:1; padding:18px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        .bubble { max-width:72%; padding:12px 14px; border-radius:14px; white-space:pre-wrap; word-break:break-word; }
        .bubble.user { align-self:flex-end; background:linear-gradient(135deg,#16a34a,#2563eb); color:#fff; border-bottom-right-radius:4px; }
        .bubble.ai { align-self:flex-start; background:rgba(255,255,255,0.04); color:var(--text-stellar); border:1px solid rgba(255,255,255,0.04); }
        .inputbar { display:flex; gap:8px; padding:12px; align-items:center; border-top:1px solid rgba(255,255,255,0.03); background: rgba(0,0,0,0.3); }
        .inputbar textarea { flex:1; min-height:48px; max-height:160px; padding:12px; border-radius:12px; resize:vertical; }
        .icon-btn { width:44px; height:44px; display:inline-grid; place-items:center; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); cursor:pointer; }
        .send-btn { padding:10px 14px; border-radius:12px; background:linear-gradient(135deg,#22c55e,#06b6d4); color:white; border:none; cursor:pointer; min-height:44px; }
        .upload-preview { max-width:240px; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
        .system-msg { align-self:center; background:rgba(59,130,246,0.1); padding:8px 12px; border-radius:12px; color:#bfdbfe; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { order:2; display:flex; flex-direction:row; gap:8px; overflow:auto; } .topbar { position:sticky; top:0; z-index:50; } .chat-area { height: calc(100vh - 112px); } }
        @media (max-width:480px) { .bubble { max-width:100%; } .sidebar { display:flex; gap:6px; padding:8px; } }
    </style>
</head>
<body>
    <div class="layout">
        <div class="topbar">
            <div class="title">💬 VisionTrader AI</div>
            <div style="margin-left:auto; color:var(--muted); font-size:0.95rem">مستشارك التداولي الذكي</div>
        </div>

        <aside class="sidebar">
            <a href="upload.html" class="active">💬 المحادثة</a>
            <a href="history.html">📋 السجل</a>
            <a href="settings.html">⚙️ الإعدادات</a>
        </aside>

        <main class="chat-area">
            <div id="messages" class="messages"></div>

            <div class="inputbar">
                <button id="attachBtn" class="icon-btn" title="رفع صورة">📷</button>
                <textarea id="userInput" placeholder="اكتب سؤالك أو ارفع صورة الشارت هنا (Shift+Enter لسطر جديد)"></textarea>
                <button id="sendBtn" class="send-btn">إرسال</button>
                <input id="fileInput" type="file" accept="image/*" style="display:none">
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');

        let attachedFile = null;
        const HISTORY_KEY = 'vt_conv_history_v1';

        function saveToHistory(entry) {
            try {
                const cur = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                cur.push(Object.assign({ts: Date.now()}, entry));
                // keep last 50
                localStorage.setItem(HISTORY_KEY, JSON.stringify(cur.slice(-50)));
            } catch(e) { console.warn('history save failed', e); }
        }

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
        }

        function computeTone() {
            const history = getHistory();
            if (!history.length) return 'balanced';
            const userMsgs = history.filter(h => h.role==='user').map(h => (h.text||'').length);
            const avg = userMsgs.reduce((a,b)=>a+b,0) / (userMsgs.length||1);
            return avg < 60 ? 'concise' : 'detailed';
        }

        function appendBubble(text, role='ai') {
            const div = document.createElement('div');
            div.className = 'bubble ' + (role==='user' ? 'user' : (role==='system' ? 'system-msg' : 'ai'));
            div.innerText = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function appendSystem(text) { const el = document.createElement('div'); el.className='system-msg'; el.innerText=text; messagesEl.appendChild(el); messagesEl.scrollTop = messagesEl.scrollHeight; }

        function detectMarketFromText(text) {
            const t = (text||'').toLowerCase();
            if (t.includes('ذهب') || t.includes('xau') || t.includes('xauusd')) return 'XAUUSD';
            if (t.includes('بيتكوين') || t.includes('btc')) return 'BTCUSDT';
            if (t.includes('إيثريوم') || t.includes('eth')) return 'ETHUSDT';
            // add more heuristics as needed
            return null;
        }

        async function localAgentResponse(userText, marketHint) {
            // Simple adaptive assistant behavior before/while contacting server
            const tone = computeTone();
            if (!userText && attachedFile) {
                return 'تلقيت صورة الشارت، سأحللها الآن وأرد عليك.';
            }
            const t = (userText||'').trim();
            if (/^حلل\b|\bحلل$/.test(t)) {
                if (attachedFile) return 'جاري تحليل الشارت المرفق. انتظر لحظة...';
                return 'هل ترغب في رفع صورة الشارت أم تحدد سوقاً للتحليل؟ اكتب اسم السوق أو ارفع صورة.';
            }
            if (/^ذهب\b|\bذهب$/.test(t) || detectMarketFromText(t) === 'XAUUSD') {
                return tone==='concise' ? 'فهمت: تحليل XAUUSD، تحليل موجز قادم.' : 'فهمت أنك تقصد الذهب (XAUUSD). سأجري تحليلًا شاملاً للشارت إذا أرفقت واحداً أو سأستخدم بيانات السوق الحالية.';
            }
            // Default friendly reply while contacting API
            return tone==='concise' ? 'أفهم، أبحث عن إجابة قصيرة ومباشرة...' : 'حسناً، سأفحص سؤالك وأرد بتحليل مفصل إذا أمكن. أضف شارت لتحسين الدقة.';
        }

        async function sendToServer(formData) {
            // call api.askAgent (defined in js/api.js)
            try {
                const res = await api.askAgent(formData);
                return res;
            } catch (err) {
                throw err;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !attachedFile) { appendSystem('اكتب شيئاً أو أرفق صورة قبل الإرسال.'); return; }

            appendBubble(text || (attachedFile ? 'صورة مرفقة' : ''), 'user');
            saveToHistory({role:'user', text: text || '[image]'});
            userInput.value = '';

            // Local immediate adaptive reply
            const marketHint = detectMarketFromText(text);
            const localReply = await localAgentResponse(text, marketHint);
            appendBubble(localReply, 'ai');
            saveToHistory({role:'ai', text: localReply});

            // Build form data to send to backend
            const form = new FormData();
            form.append('question', text || '');
            if (attachedFile) form.append('image', attachedFile);
            if (marketHint) form.append('market', marketHint);
            // adaptive style hint
            form.append('style', computeTone());

            try {
                const serverResp = await sendToServer(form);
                const answer = serverResp?.answer || serverResp || 'تعذر الحصول على رد من الخادم.';
                // If server provides visual_analysis, show it
                if (serverResp && serverResp.visual_analysis && serverResp.visual_analysis.analysis) {
                    appendBubble('تحليل الصورة: ' + serverResp.visual_analysis.analysis, 'ai');
                    saveToHistory({role:'ai', text: serverResp.visual_analysis.analysis});
                }
                appendBubble(answer, 'ai');
                saveToHistory({role:'ai', text: answer});
            } catch (err) {
                appendSystem('فشل الاتصال بالوكيل: ' + (err.message || err));
            } finally {
                // clear attached file after sending
                attachedFile = null;
                // remove preview if any
                const prev = document.querySelector('.upload-preview'); if (prev) prev.remove();
            }
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const f = e.target.files && e.target.files[0];
            if (!f) return;
            if (!f.type.startsWith('image/')) { appendSystem('الملف ليس صورة.'); return; }
            attachedFile = f;
            const url = URL.createObjectURL(f);
            const img = document.createElement('img'); img.src=url; img.style.width='120px';
            const wrap = document.createElement('div'); wrap.className='upload-preview'; wrap.appendChild(img);
            messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
            appendSystem('تم إرفاق صورة، اضغط إرسال ليتم تحليلها.');
        });

        // Drag & drop support
        document.addEventListener('dragover', e=>e.preventDefault());
        document.addEventListener('drop', e=>e.preventDefault());
        messagesEl.addEventListener('dragover', e=>{ e.preventDefault(); });
        messagesEl.addEventListener('drop', e=>{
            e.preventDefault();
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if (!f) return;
            if (!f.type.startsWith('image/')) { appendSystem('الملف المرفوع ليس صورة.'); return; }
            attachedFile = f;
            const url = URL.createObjectURL(f);
            const img = document.createElement('img'); img.src=url; img.style.width='160px';
            const wrap = document.createElement('div'); wrap.className='upload-preview'; wrap.appendChild(img);
            messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
            appendSystem('تم إرفاق صورة عبر السحب والإفلات.');
        });

        // Keyboard: Enter to send, Shift+Enter newline
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        // Initial welcome
        window.addEventListener('load', () => {
            appendSystem('أهلاً! أنا مستشارك الذكي. تقدر تسألني عن أي سوق أو ترفع شارت وأحلله لك.');
        });
    </script>
</body>
</html>
